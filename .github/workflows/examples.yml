name: examples

# Validates and (on push to main) publishes the Rust components under
# examples/. Pipeline:
#   plan    dorny/paths-filter → plan-matrix.mjs picks the matrix for
#           this event (PR = intersection with changed paths, push or
#           examples-canary label = everything).
#   build   matrix-fans over plan.outputs.matrix; each cell runs
#           build-rust-example (fmt + clippy + wash build, plus
#           OCI publish on pushes to main when `image` is set).
#
# This fork trims upstream's pipeline:
#   - coverage job removed: it scans for `.wash/config.yaml` on disk,
#     but http-api-distributed's real config is gitignored (contains
#     per-developer secrets), so coverage always fails on the checkout.
#     The build job materializes a minimal CI-only config instead.
#   - One ITEMS entry per published wasm: http-api-distributed is a
#     Cargo workspace with two members (http-api, task-leet). Each
#     entry pins `package` + `component` so the generated config builds
#     only the relevant crate and pushes the matching .wasm artifact.

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # omit image to skip publish
  # filter, when present, points at the paths-filter group that gates this
  # item so that multiple items can share a `filter`. e.g. examples/grpc-hello-world/**
  ITEMS: |
    [
      {"key": "http-api-distributed", "workdir": "examples/http-api-distributed", "package": "http-api",  "component": "http_api.wasm", "image": "ghcr.io/qhliang/components/http-api-distributed"},
      {"key": "task-leet",            "workdir": "examples/http-api-distributed", "package": "task-leet", "component": "task_leet.wasm", "image": "ghcr.io/qhliang/components/task-leet"}
    ]
  # When these change, every example rebuilds.
  SHARED_PATHS: |
    [
      ".github/actions/build-rust-example/**",
      ".github/actions/setup-rust/**",
      ".github/scripts/plan-matrix.mjs",
      ".github/scripts/coverage-matrix.mjs",
      ".github/scripts/gen-filters.mjs",
      ".github/workflows/examples.yml"
    ]

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      has_items: ${{ steps.compute.outputs.has_items }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate paths-filter config from ITEMS
        if: github.event_name == 'pull_request'
        env:
          ITEMS: ${{ env.ITEMS }}
          SHARED_PATHS: ${{ env.SHARED_PATHS }}
          OUTPUT: ${{ runner.temp }}/filters.yml
        run: node .github/scripts/gen-filters.mjs

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: ${{ runner.temp }}/filters.yml

      - name: Compute build matrix
        id: compute
        env:
          ITEMS: ${{ env.ITEMS }}
          CHANGED: ${{ steps.filter.outputs.changes }}
          EVENT_NAME: ${{ github.event_name }}
          CANARY: ${{ contains(github.event.pull_request.labels.*.name, 'examples-canary') }}
        run: node .github/scripts/plan-matrix.mjs

  build:
    needs:
      - plan
    if: needs.plan.outputs.has_items == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # Required so build-rust-example's OCI publish step can push to ghcr
      # on push events. PRs (including forks) get the token in read-only
      # mode, so the publish step is a no-op there even with this set.
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          install-nightly: "true"
          install-wash: "true"

      - if: matrix.needs_protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create minimal wash config if missing
        working-directory: ${{ matrix.workdir }}
        env:
          PACKAGE: ${{ matrix.package }}
          COMPONENT: ${{ matrix.component }}
        run: |
          if [[ -f .wash/config.yaml ]]; then
            echo ".wash/config.yaml already exists, skipping generation"
            exit 0
          fi
          mkdir -p .wash
          cat > .wash/config.yaml <<EOF
          build:
            command: cargo build -p ${PACKAGE} --target wasm32-wasip2 --release
            component_path: target/wasm32-wasip2/release/${COMPONENT}
          EOF
          echo "Generated minimal .wash/config.yaml for package ${PACKAGE} (CI override; the real one is gitignored because it contains per-developer secrets)"

      - uses: ./.github/actions/build-rust-example
        with:
          working-directory: ${{ matrix.workdir }}
          image: ${{ matrix.image }}
          package-name: ${{ matrix.package }}

  gate:
    needs:
      - plan
      - build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to pass or be skipped
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          if echo "$RESULTS" | grep -qE '"(failure|cancelled)"'; then
            exit 1
          fi
