name: build-http-api-distributed

on:
  workflow_run:
    workflows:
      - wash
    types:
      - completed
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  build-wasm:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          rust-toolchain: stable
          rust-targets: wasm32-wasip2

      - name: Download wash binary artifact
        uses: actions/download-artifact@018cc2cf5baa6db3efc5f8a56943fffe632ef53 # v6.0.0
        with:
          name: wash-x86_64-unknown-linux-musl
          path: ./wash-bin
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make wash executable
        run: |
          chmod +x ./wash-bin/wash
          echo "WASH_BIN=$(pwd)/wash-bin/wash" >> "$GITHUB_ENV"

      - name: Build wasm components
        working-directory: examples/http-api-distributed
        run: |
          ${{ env.WASH_BIN }} build --skip-fetch

      - name: Verify wasm artifacts
        working-directory: examples/http-api-distributed
        run: |
          ls -lh target/wasm32-wasip2/release/http_api.wasm
          ls -lh target/wasm32-wasip2/release/task_leet.wasm

      - name: Login to GHCR
        uses: docker/login-action@5e57cd11890d871c5c7afbaffeae0e6b7e5e9bc3 # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install oras
        uses: oras-project/setup-oras@227458c4b8a19ebae8c0b9553003f4f2bc6c4f04 # v1.2.6

      - name: Determine tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Push http_api.wasm to GHCR
        working-directory: examples/http-api-distributed
        run: |
          oras push ghcr.io/${{ github.repository_owner }}/http-api-wasm:${{ steps.meta.outputs.short_sha }} \
            target/wasm32-wasip2/release/http_api.wasm:application/wasm
          oras tag ghcr.io/${{ github.repository_owner }}/http-api-wasm:${{ steps.meta.outputs.short_sha }} latest

      - name: Push task_leet.wasm to GHCR
        working-directory: examples/http-api-distributed
        run: |
          oras push ghcr.io/${{ github.repository_owner }}/task-leet-wasm:${{ steps.meta.outputs.short_sha }} \
            target/wasm32-wasip2/release/task_leet.wasm:application/wasm
          oras tag ghcr.io/${{ github.repository_owner }}/task-leet-wasm:${{ steps.meta.outputs.short_sha }} latest
