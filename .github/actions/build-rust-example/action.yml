name: "Build Rust example"
description: >
  Lint (cargo +nightly fmt --check, cargo clippy --locked -- -D warnings),
  build via `wash build` (which reads .wash/config.yaml's build.command
  and fetches WIT dependencies as needed), and (optionally) publish to
  OCI on pushes to main. CI mirrors what `wash build` does locally, so a
  passing build here is the same passing build a contributor would see.
  The caller must invoke `./.github/actions/setup-rust` (with
  `install-nightly: "true"` and `install-wash: "true"`) exactly once
  before calling this action, plus any example-specific build tools
  (e.g., protoc for tonic-build).

inputs:
  working-directory:
    description: "Directory containing the example's .wash/config.yaml."
    required: true
  image:
    description: >
      OCI image to push to, without a tag (e.g. ghcr.io/wasmcloud/components/blobby).
      On pushes to main, publishes a single tag whose value is the Cargo
      package version. Skips the push if that tag already exists in the
      registry, so bump-the-version is the explicit signal to release.
      Omit (or pass empty) to skip the publish steps entirely.
    required: false
    default: ""
  package-name:
    description: >
      Cargo package name to publish. Required when the working-directory
      is a Cargo workspace root (its top-level Cargo.toml has [workspace]
      instead of [package]); the publish step needs the package name to
      look up the version via `cargo metadata`. When omitted, the name is
      read from `Cargo.toml`'s [package].name field, which assumes a
      single-package example.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Fetch WIT dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Skip when wit/deps/ already has content — the example ships its
        # deps committed (typically because it imports custom:* namespaces
        # that have no public registry, so wash wit fetch would fail trying
        # to resolve them).
        if [[ -d wit ]] && ! ls wit/deps/* >/dev/null 2>&1; then
          wash wit fetch
        else
          echo "wit/deps/ already populated (or no wit/ dir), skipping wash wit fetch"
        fi

    - name: Format check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo +nightly fmt -- --check

    - name: Clippy
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: cargo clippy --target wasm32-wasip2 --locked -- -D warnings

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      # --skip-fetch: wit/deps/ is either pre-populated by the Fetch WIT
      # dependencies step above, or committed to the repo for namespaces
      # without a public registry. Either way wash build should not try
      # to refresh deps itself.
      run: wash build --skip-fetch

    - name: Login to ghcr.io
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.image != ''
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ github.token }}

    - name: Publish or skip
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.image != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE: ${{ inputs.image }}
      run: |
        COMPONENT_PATH=$(yq '.build.component_path' .wash/config.yaml)
        if [[ -z "${COMPONENT_PATH}" || "${COMPONENT_PATH}" == "null" ]]; then
          echo "ERROR: .wash/config.yaml is missing build.component_path" >&2
          exit 1
        fi
        # Resolve the Cargo package name + version. When the caller
        # supplies `package-name` (workspace case), use it directly;
        # otherwise read from Cargo.toml's [package].name.
        PKG_NAME="${{ inputs.package-name }}"
        if [[ -z "${PKG_NAME}" ]]; then
          PKG_NAME=$(yq -p toml '.package.name' Cargo.toml)
        fi
        if [[ -z "${PKG_NAME}" || "${PKG_NAME}" == "null" ]]; then
          echo "ERROR: package.name missing in Cargo.toml (and package-name input not set)" >&2
          exit 1
        fi
        VERSION=$(cargo metadata --format-version 1 --no-deps --manifest-path Cargo.toml \
          | jq -r --arg name "${PKG_NAME}" '.packages[] | select(.name == $name) | .version')
        if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
          echo "ERROR: could not resolve version for package ${PKG_NAME}" >&2
          exit 1
        fi
        # docker manifest inspect uses the docker login state set up by the
        # earlier step. Exit code 0 means the tag already exists.
        if docker manifest inspect "${IMAGE}:${VERSION}" >/dev/null 2>&1; then
          echo "${IMAGE}:${VERSION} already exists in registry, skipping push (bump the package version to release a new build)"
          exit 0
        fi
        echo "Publishing ${PKG_NAME} v${VERSION} to ${IMAGE}:${VERSION}"
        wash oci push "${IMAGE}:${VERSION}" "${COMPONENT_PATH}"
