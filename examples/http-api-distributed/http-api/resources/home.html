<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Task API</title>
        <style>
            {BASE_CSS}
        </style>
    </head>
    <body>
        <h1>Task API</h1>
        {NAV}
        <form id="taskForm">
            <label for="worker">Worker</label>
            <select id="worker" name="worker">
                <option value="task-leet" selected>Leet Speak</option>
            </select>

            <label for="payload">Payload</label>
            <textarea
                id="payload"
                name="payload"
                placeholder="Enter your message here..."
            ></textarea>

            <button type="submit" id="submitBtn">Send Task</button>
        </form>

        <div id="result"></div>

        <script>
            {
                BASE_JS;
            }
            const form = document.getElementById("taskForm");
            const workerSelect = document.getElementById("worker");
            const payloadTextarea = document.getElementById("payload");
            const submitBtn = document.getElementById("submitBtn");
            const resultDiv = document.getElementById("result");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const worker = workerSelect.value;
                const payload = payloadTextarea.value;
                if (!payload.trim()) {
                    showResult("result", "Payload is required", true);
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = "Sending...";
                resultDiv.style.display = "none";

                try {
                    const resp = await fetch("/task", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ payload, worker }),
                    });
                    const text = await resp.text();
                    showResult(
                        "result",
                        resp.ok ? text : "Error " + resp.status + ": " + text,
                        !resp.ok,
                    );
                } catch (err) {
                    showResult(
                        "result",
                        "Request failed: " + err.message,
                        true,
                    );
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Send Task";
                }
            });
        </script>
    </body>
</html>
